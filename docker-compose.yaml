version: "3.8"

x-volume-root-project: &volume_root_project "./:/var/www/html"

networks:
  docker:
    driver: bridge

services:

  app:
    restart: always
    build:
      context: .
      dockerfile: docker/php-fpm/Dockerfile
    volumes:
      - *volume_root_project
      # vendor установлен в образе на этапе сборки; анонимный volume
      # предотвращает перекрытие vendor bind-mount'ом хоста
      - /var/www/html/vendor
#      - ./docker/php-fpm/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
    networks:
      - docker
    environment:
      PHP_IDE_CONFIG: "serverName=app"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    restart: always
    build:
      context: .
      dockerfile: docker/php-fpm/Dockerfile
    volumes:
      - *volume_root_project
      - /var/www/html/vendor
    networks:
      - docker
    entrypoint: ["worker-entrypoint.sh"]
    command: []
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  nginx:
    restart: always
    image: nginx:latest
    volumes:
      - "./docker/nginx/conf.d:/etc/nginx/conf.d:ro"
      - *volume_root_project
    networks:
      - docker
    ports:
      - "8090:80"
    depends_on:
      - app

  redis:
    restart: always
    image: redis:latest
    volumes:
      - "redis-data:/data"
    ports:
      - "16379:6379"
    networks:
      - docker
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    restart: always
    image: rabbitmq:3-management
    volumes:
      - "rabbitmq-data:/var/lib/rabbitmq"
    ports:
      - "15673:15672"
      - "5673:5672"
    environment:
      RABBITMQ_ERLANG_COOKIE: $RABBITMQ_ERLANG_COOKIE
      RABBITMQ_DEFAULT_USER: $RABBITMQ_DEFAULT_USER
      RABBITMQ_DEFAULT_PASS: $RABBITMQ_DEFAULT_PASS
    networks:
      - docker
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  rabbitmq-data:
  redis-data:
